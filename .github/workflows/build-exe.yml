name: Build EstacionZebra exe

on:
  workflow_dispatch:
  push:
    paths:
      - 'print_station.py'
      - '.github/workflows/build-exe.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Instalar dependencias
        run: pip install pyinstaller pywin32 requests
      - name: Construir EstacionZebra.exe
        run: pyinstaller --onefile --name EstacionZebra print_station.py
      - name: Publicar el .exe como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: EstacionZebra-exe
          path: dist/EstacionZebra.exe
          if-no-files-found: error
